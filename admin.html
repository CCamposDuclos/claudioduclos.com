<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Claudio Duclos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080808;
      --surface: #101010;
      --surface2: #161616;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --white: #f2f2f2;
      --muted: #666;
      --accent: #f2f2f2;
      --danger: #c0392b;
      --sans: 'Manrope', sans-serif;
      --mono: 'Space Mono', monospace;
      --sidebar-w: 260px;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOPBAR ──────────────────────────────────── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-logo {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.03em;
      text-decoration: none;
      color: var(--white);
    }
    .topbar-divider {
      width: 1px; height: 18px;
      background: var(--border2);
    }
    .topbar-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .unsaved-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #e67e22;
      display: none;
    }
    .unsaved-dot.show { display: block; }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tbtn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
    }
    .tbtn:hover { color: var(--white); border-color: rgba(255,255,255,.25); }
    .tbtn-primary {
      background: var(--white);
      color: var(--bg);
      border-color: var(--white);
    }
    .tbtn-primary:hover { opacity: .85; color: var(--bg); }

    /* ── LAYOUT ──────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .btn-new {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      border-radius: 10px;
      border: 1px dashed var(--border2);
      background: transparent;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
    }
    .btn-new:hover { color: var(--white); border-color: rgba(255,255,255,.25); background: rgba(255,255,255,.03); }
    .proj-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    .proj-list::-webkit-scrollbar { width: 4px; }
    .proj-list::-webkit-scrollbar-track { background: transparent; }
    .proj-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    .proj-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background .15s;
      user-select: none;
    }
    .proj-item:hover { background: rgba(255,255,255,.04); }
    .proj-item.active { background: rgba(255,255,255,.07); }
    .drag-handle {
      color: var(--muted);
      cursor: grab;
      font-size: 14px;
      flex-shrink: 0;
      line-height: 1;
    }
    .drag-handle:active { cursor: grabbing; }
    .proj-item-swatch {
      width: 28px; height: 28px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .proj-item-info { flex: 1; min-width: 0; }
    .proj-item-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .proj-item-cat {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .proj-item.dragging { opacity: .4; }
    .proj-item.drag-over { border-top: 2px solid var(--white); }

    /* ── MAIN ────────────────────────────────────── */
    .main {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }
    .main::-webkit-scrollbar { width: 6px; }
    .main::-webkit-scrollbar-track { background: transparent; }
    .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
    }
    .placeholder-icon { font-size: 40px; opacity: .3; }
    .placeholder p { font-size: 14px; font-weight: 500; }
    .placeholder small {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      opacity: .5;
    }

    /* ── FORM ────────────────────────────────────── */
    .form-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 48px 80px;
      display: none;
    }
    .form-wrap.visible { display: block; }
    .form-section-title {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .form-row.two   { grid-template-columns: 1fr 1fr; }
    .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    label small { font-weight: 400; text-transform: none; letter-spacing: 0; opacity: .7; }
    .id-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }
    .id-row input { flex: 1; font-family: var(--mono); font-size: 13px; }
    .btn-regen {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      cursor: pointer;
      white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .btn-regen:hover { color: var(--white); border-color: rgba(255,255,255,.3); }
    input[type="text"],
    input[type="url"],
    input[type="number"],
    textarea {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      color: var(--white);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color .2s;
      resize: vertical;
    }
    input[type="text"]:focus,
    input[type="url"]:focus,
    input[type="number"]:focus,
    textarea:focus { border-color: rgba(255,255,255,.35); }
    textarea { min-height: 110px; line-height: 1.6; }

    /* cover image preview */
    .cover-preview {
      margin-top: 10px;
      height: 140px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
    }
    .cover-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .cover-preview.has-image img { display: block; }
    .cover-preview.has-image span { display: none; }

    /* gradient field */
    .gradient-field { position: relative; }
    .gradient-preview-bar {
      height: 52px;
      border-radius: 10px;
      border: 1px solid var(--border2);
      margin-top: 10px;
      transition: background .3s;
    }
    .gradient-presets {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .preset-swatch {
      width: 36px; height: 36px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s, transform .15s;
      flex-shrink: 0;
    }
    .preset-swatch:hover { transform: scale(1.1); }
    .preset-swatch.active { border-color: var(--white); }

    /* tags preview */
    .tags-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      min-height: 28px;
    }
    .tag-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border: 1px solid var(--border2);
      border-radius: 99px;
      color: rgba(242,242,242,.7);
    }

    /* form divider */
    .form-divider {
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    /* ── BODY BLOCKS ─────────────────────────────── */
    .blocks-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    .block {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      overflow: hidden;
    }
    .block-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      background: rgba(255,255,255,.025);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .block-drag {
      color: var(--muted);
      cursor: grab;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }
    .block-drag:active { cursor: grabbing; }
    .block-type-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,.06);
      padding: 3px 8px;
      border-radius: 4px;
    }
    .block-actions {
      display: flex;
      gap: 2px;
      margin-left: auto;
    }
    .block-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 6px;
      cursor: pointer;
      transition: color .15s, background .15s;
    }
    .block-btn:hover { color: var(--white); background: rgba(255,255,255,.07); }
    .block-btn.danger:hover { color: #e74c3c; background: rgba(192,57,43,.1); }
    .block-btn:disabled { opacity: .25; pointer-events: none; }
    .block-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .block-body input[type="text"],
    .block-body input[type="url"],
    .block-body textarea { border-radius: 8px; }
    .block-body textarea { min-height: 100px; }
    .block-body .field-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: -4px;
    }
    .block-image-preview {
      height: 100px;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 11px;
    }
    .block-image-preview img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .block-image-preview.has-img img { display: block; }
    .block-image-preview.has-img span { display: none; }

    /* slider image list in admin */
    .slider-imgs-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }
    .slider-img-row {
      display: grid;
      grid-template-columns: 64px 1fr 1fr 26px;
      gap: 8px;
      align-items: center;
      padding: 8px;
      background: rgba(255,255,255,.02);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .slider-img-thumb {
      height: 48px;
      border-radius: 6px;
      background: rgba(255,255,255,.04);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: .05em;
    }
    .slider-img-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .slider-img-thumb.has-img img { display: block; }
    .slider-img-thumb.has-img span { display: none; }

    .block-add-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-add-block {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px dashed var(--border2);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: color .2s, border-color .2s, background .2s;
    }
    .btn-add-block:hover { color: var(--white); border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.03); }

    /* actions */
    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .btn-danger {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border-radius: 10px;
      border: 1px solid rgba(192,57,43,.4);
      color: #e74c3c;
      background: transparent;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .btn-danger:hover { background: rgba(192,57,43,.12); border-color: rgba(192,57,43,.7); }
    .preview-link {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .preview-link:hover { color: var(--white); }

    /* ── TOAST ───────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--white);
      color: var(--bg);
      font-size: 13px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 12px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 1000;
    }
    .toast.show { opacity: 1; transform: none; }

    #import-input { display: none; }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <a href="index.html" class="topbar-logo">CD.</a>
      <div class="topbar-divider"></div>
      <span class="topbar-label">Admin</span>
      <div class="unsaved-dot" id="unsaved-dot" title="Alterações não salvas"></div>
    </div>
    <div class="topbar-right">
      <a href="index.html" target="_blank" class="tbtn">Ver Portfolio ↗</a>
      <button class="tbtn" id="btn-import">Importar JSON</button>
      <button class="tbtn" id="btn-export">Exportar JSON</button>
      <button class="tbtn tbtn-primary" id="btn-save">Salvar</button>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <button class="btn-new" id="btn-new">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Novo Projeto
        </button>
      </div>
      <ul class="proj-list" id="proj-list"></ul>
    </aside>

    <!-- MAIN -->
    <div class="main" id="main">

      <div class="placeholder" id="placeholder">
        <div class="placeholder-icon">◻</div>
        <p>Selecione um projeto para editar</p>
        <small>ou crie um novo pela barra lateral</small>
      </div>

      <div class="form-wrap" id="form-wrap">

        <!-- ── INFORMAÇÕES ─────────────────────────────── -->
        <div class="form-section-title">Informações do Projeto</div>

        <div class="form-row">
          <div class="field">
            <label>Título</label>
            <input type="text" id="f-title" placeholder="Nome do projeto">
          </div>
        </div>
        <div class="form-row">
          <div class="field">
            <label>ID / Slug <small>— aparece na URL: project.html?id=<span id="slug-preview">…</span></small></label>
            <div class="id-row">
              <input type="text" id="f-id" placeholder="ex: locfy-app" spellcheck="false">
              <button type="button" class="btn-regen" id="btn-regen-id">↺ Gerar do título</button>
            </div>
          </div>
        </div>
        <div class="form-row two">
          <div class="field">
            <label>Cliente / Empresa</label>
            <input type="text" id="f-client" placeholder="Nome do cliente">
          </div>
          <div class="field">
            <label>Categoria</label>
            <input type="text" id="f-category" placeholder="Ex: UX Design · Desenvolvimento">
          </div>
        </div>
        <div class="form-row two">
          <div class="field">
            <label>Ano</label>
            <input type="text" id="f-year" maxlength="4" placeholder="2025">
          </div>
          <div class="field">
            <label>Link Externo</label>
            <input type="url" id="f-link" placeholder="https://...">
          </div>
        </div>

        <div class="form-divider"></div>

        <!-- ── CONTEÚDO ────────────────────────────────── -->
        <div class="form-section-title">Conteúdo</div>

        <div class="form-row">
          <div class="field">
            <label>Descrição Curta <small>— exibida no card da listagem</small></label>
            <textarea id="f-description" rows="3" placeholder="Resumo do projeto em 1–2 frases..."></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="field">
            <label>Tags <small>(separadas por vírgula)</small></label>
            <input type="text" id="f-tags" placeholder="UX Design, React, Figma">
            <div class="tags-preview" id="tags-preview"></div>
          </div>
        </div>

        <div class="form-divider"></div>

        <!-- ── CORPO DO PROJETO ────────────────────────── -->
        <div class="form-section-title">Corpo do Projeto <small style="font-family:var(--mono);font-size:9px;letter-spacing:.1em;margin-left:8px;opacity:.5;">blocos de conteúdo da página de detalhe</small></div>

        <div class="blocks-list" id="blocks-list"></div>

        <div class="block-add-bar">
          <button class="btn-add-block" data-add="section">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 11h12M4 16h8"/></svg>
            Seção com Título
          </button>
          <button class="btn-add-block" data-add="text">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 6h16M4 12h10M4 18h14"/></svg>
            Parágrafo
          </button>
          <button class="btn-add-block" data-add="image">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            Imagem
          </button>
          <button class="btn-add-block" data-add="duo">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>
            Imagens Lado a Lado
          </button>
          <button class="btn-add-block" data-add="slider">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 9h20"/><circle cx="8" cy="17" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="17" r="1" fill="currentColor" stroke="none"/><circle cx="16" cy="17" r="1" fill="currentColor" stroke="none"/></svg>
            Slide de Imagens
          </button>
        </div>

        <div class="form-divider"></div>

        <!-- ── APARÊNCIA ───────────────────────────────── -->
        <div class="form-section-title">Aparência</div>

        <div class="form-row">
          <div class="field">
            <label>Imagem de Capa <small>— hero da página de detalhe</small></label>
            <input type="url" id="f-cover" placeholder="https://... ou assets/projects/nome.jpg">
            <div class="cover-preview" id="cover-preview">
              <img id="cover-preview-img" alt="Capa">
              <span>Pré-visualização da capa</span>
            </div>
          </div>
        </div>

        <div class="form-row">
          <div class="field gradient-field">
            <label>Gradiente CSS do Card</label>
            <input type="text" id="f-gradient" placeholder="linear-gradient(135deg, #0d1b3e 0%, #1a2d5a 100%)">
            <div class="gradient-preview-bar" id="gradient-preview-bar"></div>
            <div class="gradient-presets" id="gradient-presets"></div>
          </div>
        </div>

        <div class="form-divider"></div>

        <div class="form-actions">
          <a class="preview-link" id="preview-link" href="#" target="_blank">Pré-visualizar projeto ↗</a>
          <button class="btn-danger" id="btn-delete">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
            </svg>
            Excluir Projeto
          </button>
        </div>

      </div>
    </div>
  </div>

  <input type="file" id="import-input" accept=".json">
  <div class="toast" id="toast"></div>

  <script>
    // ── Gradient presets ─────────────────────────────────────────
    const PRESETS = [
      { label: 'Azul',     value: 'linear-gradient(135deg, #0d1b3e 0%, #1a2d5a 40%, #0a1628 100%)' },
      { label: 'Âmbar',    value: 'linear-gradient(145deg, #2a1106 0%, #1a0a00 60%, #0d0500 100%)' },
      { label: 'Floresta', value: 'linear-gradient(135deg, #091f1f 0%, #0d2d2d 60%, #061414 100%)' },
      { label: 'Roxo',     value: 'linear-gradient(135deg, #130d25 0%, #1e1040 60%, #0a0618 100%)' },
      { label: 'Rosa',     value: 'linear-gradient(135deg, #25091a 0%, #3d1029 60%, #150608 100%)' },
      { label: 'Ardósia',  value: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%)' },
      { label: 'Grafite',  value: 'linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #111 100%)' },
      { label: 'Vinho',    value: 'linear-gradient(135deg, #1f0a0a 0%, #3d1010 50%, #0d0505 100%)' },
    ];

    // ── ProjectStore ─────────────────────────────────────────────
    const ProjectStore = (() => {
      const KEY = 'cd_projects_v1';
      return {
        async get() {
          const local = localStorage.getItem(KEY);
          if (local) return JSON.parse(local);
          try {
            const res = await fetch('data/projects.json');
            return await res.json();
          } catch { return []; }
        },
        set(projects) {
          const json = JSON.stringify(projects, null, 2);
          localStorage.setItem(KEY, json);
          sessionStorage.setItem(KEY, json);
        },
        sorted(projects) {
          return [...projects].sort((a, b) => a.order - b.order);
        },
        generateId(title) {
          return title
            .toLowerCase()
            .normalize('NFD').replace(/[̀-ͯ]/g, '')
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/(^-|-$)/g, '') || 'projeto-' + Date.now();
        }
      };
    })();

    // ── State ────────────────────────────────────────────────────
    let projects = [];
    let activeId = null;
    let dirty    = false;
    let blocks   = []; // body content blocks for the active project

    // ── Utils ─────────────────────────────────────────────────────
    let toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
    }

    function setDirty(val) {
      dirty = val;
      document.getElementById('unsaved-dot').classList.toggle('show', val);
    }

    function escHtml(str = '') {
      return String(str)
        .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
        .replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Render sidebar ────────────────────────────────────────────
    function renderSidebar() {
      const list   = document.getElementById('proj-list');
      const sorted = ProjectStore.sorted(projects);
      list.innerHTML = sorted.map(p => `
        <li class="proj-item ${p.id === activeId ? 'active' : ''}" data-id="${p.id}" draggable="true">
          <span class="drag-handle" title="Arrastar para reordenar">⠿</span>
          <div class="proj-item-swatch" style="background:${p.gradient}"></div>
          <div class="proj-item-info">
            <div class="proj-item-name">${escHtml(p.title)}</div>
            <div class="proj-item-cat">${escHtml(p.category)}</div>
          </div>
        </li>`).join('');

      list.querySelectorAll('.proj-item').forEach(li => {
        li.addEventListener('click', () => selectProject(li.dataset.id));
      });
      setupDragDrop();
    }

    // ── Drag & drop reorder ───────────────────────────────────────
    function setupDragDrop() {
      const list = document.getElementById('proj-list');
      let dragId = null;
      list.querySelectorAll('.proj-item').forEach(li => {
        li.addEventListener('dragstart', e => {
          dragId = li.dataset.id;
          li.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        li.addEventListener('dragend', () => {
          li.classList.remove('dragging');
          list.querySelectorAll('.proj-item').forEach(x => x.classList.remove('drag-over'));
        });
        li.addEventListener('dragover', e => {
          e.preventDefault();
          list.querySelectorAll('.proj-item').forEach(x => x.classList.remove('drag-over'));
          if (li.dataset.id !== dragId) li.classList.add('drag-over');
        });
        li.addEventListener('drop', e => {
          e.preventDefault();
          if (!dragId || dragId === li.dataset.id) return;
          const items   = [...list.querySelectorAll('.proj-item')];
          const fromIdx = items.findIndex(x => x.dataset.id === dragId);
          const toIdx   = items.findIndex(x => x.dataset.id === li.dataset.id);
          const sorted  = ProjectStore.sorted(projects);
          const [moved] = sorted.splice(fromIdx, 1);
          sorted.splice(toIdx, 0, moved);
          sorted.forEach((p, i) => { const proj = projects.find(x => x.id === p.id); if (proj) proj.order = i + 1; });
          setDirty(true);
          renderSidebar();
        });
      });
    }

    // ── Body blocks ───────────────────────────────────────────────
    function renderBlocks() {
      const list = document.getElementById('blocks-list');
      if (blocks.length === 0) { list.innerHTML = ''; return; }

      list.innerHTML = blocks.map((b, i) => buildBlockHTML(b, i)).join('');

      // Wire field inputs
      list.querySelectorAll('[data-bf]').forEach(el => {
        const idx   = +el.closest('[data-bi]').dataset.bi;
        const field = el.dataset.bf;
        el.addEventListener('input', () => {
          blocks[idx][field] = el.value;
          if (field === 'src') updateBlockImagePreview(idx, el.value);
          setDirty(true);
        });
      });

      // Wire block action buttons
      list.querySelectorAll('[data-bup]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = +btn.dataset.bup;
          if (i > 0) { [blocks[i-1], blocks[i]] = [blocks[i], blocks[i-1]]; renderBlocks(); setDirty(true); }
        });
      });
      list.querySelectorAll('[data-bdn]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = +btn.dataset.bdn;
          if (i < blocks.length - 1) { [blocks[i], blocks[i+1]] = [blocks[i+1], blocks[i]]; renderBlocks(); setDirty(true); }
        });
      });
      list.querySelectorAll('[data-brm]').forEach(btn => {
        btn.addEventListener('click', () => {
          blocks.splice(+btn.dataset.brm, 1);
          renderBlocks();
          setDirty(true);
        });
      });

      // Wire slider image inputs
      list.querySelectorAll('[data-sf]').forEach(el => {
        el.addEventListener('input', () => {
          const bi    = +el.closest('[data-bi]').dataset.bi;
          const ii    = +el.closest('[data-si]').dataset.si;
          const field = el.dataset.sf;
          if (!blocks[bi].images) blocks[bi].images = [];
          blocks[bi].images[ii][field] = el.value;
          if (field === 'src') updateSliderThumb(bi, ii, el.value);
          setDirty(true);
        });
      });

      // Wire slider add-image buttons
      list.querySelectorAll('[data-slider-add]').forEach(btn => {
        btn.addEventListener('click', () => {
          const bi = +btn.dataset.sliderAdd;
          blocks[bi].images.push({ src: '', alt: '' });
          renderBlocks();
          setDirty(true);
        });
      });

      // Wire slider remove-image buttons
      list.querySelectorAll('[data-slider-rm]').forEach(btn => {
        btn.addEventListener('click', () => {
          const [bi, ii] = btn.dataset.sliderRm.split('-').map(Number);
          if (blocks[bi].images.length > 1) {
            blocks[bi].images.splice(ii, 1);
            renderBlocks();
            setDirty(true);
          }
        });
      });

      // Restore image previews
      blocks.forEach((b, i) => {
        if (b.type === 'image' && b.src) updateBlockImagePreview(i, b.src);
        if (b.type === 'duo') {
          if (b.src1) updateBlockImagePreview(i, b.src1, 'a');
          if (b.src2) updateBlockImagePreview(i, b.src2, 'b');
        }
        if (b.type === 'slider') {
          (b.images || []).forEach((img, ii) => {
            if (img.src) updateSliderThumb(i, ii, img.src);
          });
        }
      });
    }

    function blockNav(i) {
      const isFirst = i === 0;
      const isLast  = i === blocks.length - 1;
      return `
        <div class="block-actions">
          <button class="block-btn" data-bup="${i}" ${isFirst ? 'disabled' : ''} title="Mover para cima">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
          </button>
          <button class="block-btn" data-bdn="${i}" ${isLast ? 'disabled' : ''} title="Mover para baixo">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <button class="block-btn danger" data-brm="${i}" title="Remover bloco">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>`;
    }

    function buildBlockHTML(b, i) {
      const nav = blockNav(i);

      if (b.type === 'text') return `
        <div class="block" data-bi="${i}">
          <div class="block-header">
            <span class="block-drag">⠿</span>
            <span class="block-type-badge">Parágrafo</span>
            ${nav}
          </div>
          <div class="block-body">
            <textarea data-bf="value" placeholder="Texto do parágrafo...">${escHtml(b.value||'')}</textarea>
          </div>
        </div>`;

      if (b.type === 'section') return `
        <div class="block" data-bi="${i}">
          <div class="block-header">
            <span class="block-drag">⠿</span>
            <span class="block-type-badge">Seção com Título</span>
            ${nav}
          </div>
          <div class="block-body">
            <input type="text" data-bf="title" value="${escHtml(b.title||'')}" placeholder="Título da seção...">
            <textarea data-bf="value" placeholder="Corpo do texto...">${escHtml(b.value||'')}</textarea>
          </div>
        </div>`;

      if (b.type === 'heading') return `
        <div class="block" data-bi="${i}">
          <div class="block-header">
            <span class="block-drag">⠿</span>
            <span class="block-type-badge">Título de Seção</span>
            ${nav}
          </div>
          <div class="block-body">
            <input type="text" data-bf="value" value="${escHtml(b.value||'')}" placeholder="Título da seção...">
          </div>
        </div>`;

      if (b.type === 'image') return `
        <div class="block" data-bi="${i}">
          <div class="block-header">
            <span class="block-drag">⠿</span>
            <span class="block-type-badge">Imagem</span>
            ${nav}
          </div>
          <div class="block-body">
            <div class="block-image-preview" id="bip-${i}">
              <img alt="">
              <span>Pré-visualização</span>
            </div>
            <input type="url" data-bf="src" value="${escHtml(b.src||'')}" placeholder="URL ou caminho da imagem (ex: assets/projects/img.jpg)">
            <input type="text" data-bf="alt" value="${escHtml(b.alt||'')}" placeholder="Texto alternativo (acessibilidade)">
            <input type="text" data-bf="caption" value="${escHtml(b.caption||'')}" placeholder="Legenda (opcional — aparece abaixo da imagem)">
          </div>
        </div>`;

      if (b.type === 'duo') return `
        <div class="block" data-bi="${i}">
          <div class="block-header">
            <span class="block-drag">⠿</span>
            <span class="block-type-badge">Imagens Lado a Lado</span>
            ${nav}
          </div>
          <div class="block-body">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div>
                <div class="block-image-preview" id="bipa-${i}"><img alt=""><span>Imagem 1</span></div>
                <input type="url" data-bf="src1" value="${escHtml(b.src1||'')}" placeholder="URL imagem 1" style="margin-top:8px">
                <input type="text" data-bf="alt1" value="${escHtml(b.alt1||'')}" placeholder="Alt 1" style="margin-top:6px">
              </div>
              <div>
                <div class="block-image-preview" id="bipb-${i}"><img alt=""><span>Imagem 2</span></div>
                <input type="url" data-bf="src2" value="${escHtml(b.src2||'')}" placeholder="URL imagem 2" style="margin-top:8px">
                <input type="text" data-bf="alt2" value="${escHtml(b.alt2||'')}" placeholder="Alt 2" style="margin-top:6px">
              </div>
            </div>
            <input type="text" data-bf="caption" value="${escHtml(b.caption||'')}" placeholder="Legenda compartilhada (opcional)">
          </div>
        </div>`;

      if (b.type === 'slider') {
        const imgs = (b.images || []).map((img, ii) => `
          <div class="slider-img-row">
            <div class="slider-img-thumb" id="sit-${i}-${ii}">
              <img src="${escHtml(img.src||'')}" alt="">
              <span>#${ii + 1}</span>
            </div>
            <input type="url" data-si="${ii}" data-sf="src" value="${escHtml(img.src||'')}" placeholder="URL da imagem...">
            <input type="text" data-si="${ii}" data-sf="alt" value="${escHtml(img.alt||'')}" placeholder="Alt text (opcional)">
            <button type="button" class="block-btn danger" data-slider-rm="${i}-${ii}" title="Remover" ${(b.images||[]).length <= 1 ? 'disabled' : ''}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>`).join('');

        return `
          <div class="block" data-bi="${i}">
            <div class="block-header">
              <span class="block-drag">⠿</span>
              <span class="block-type-badge">Slide de Imagens</span>
              ${nav}
            </div>
            <div class="block-body">
              <div class="slider-imgs-list">${imgs}</div>
              <button type="button" class="btn-add-block" data-slider-add="${i}" style="margin-bottom:4px">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                Adicionar imagem
              </button>
              <input type="text" data-bf="caption" value="${escHtml(b.caption||'')}" placeholder="Legenda (opcional)">
            </div>
          </div>`;
      }

      return '';
    }

    function updateSliderThumb(bi, ii, src) {
      const box = document.getElementById(`sit-${bi}-${ii}`);
      if (!box) return;
      const img = box.querySelector('img');
      if (src) {
        img.src     = src;
        img.onload  = () => box.classList.add('has-img');
        img.onerror = () => box.classList.remove('has-img');
      } else {
        box.classList.remove('has-img');
      }
    }

    function updateBlockImagePreview(idx, src, side) {
      const id  = side ? `bip${side}-${idx}` : `bip-${idx}`;
      const box = document.getElementById(id);
      if (!box) return;
      const img = box.querySelector('img');
      if (src) {
        img.src = src;
        img.onload  = () => box.classList.add('has-img');
        img.onerror = () => box.classList.remove('has-img');
      } else {
        box.classList.remove('has-img');
      }
    }

    function addBlock(type) {
      const defaults = {
        section: { type: 'section', title: '', value: '' },
        text:    { type: 'text',    value: '' },
        heading: { type: 'heading', value: '' },
        image:   { type: 'image',   src: '', alt: '', caption: '' },
        duo:     { type: 'duo',     src1: '', alt1: '', src2: '', alt2: '', caption: '' },
        slider:  { type: 'slider',  images: [{ src: '', alt: '' }, { src: '', alt: '' }], caption: '' },
      };
      blocks.push({ ...defaults[type] });
      renderBlocks();
      setDirty(true);
      // Scroll to the new block
      const list = document.getElementById('blocks-list');
      list.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Select project ────────────────────────────────────────────
    function selectProject(id) {
      activeId = id;
      const project = projects.find(p => p.id === id);
      if (!project) return;

      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('form-wrap').classList.add('visible');

      document.getElementById('f-title').value       = project.title       || '';
      document.getElementById('f-id').value          = project.id          || '';
      document.getElementById('slug-preview').textContent = project.id    || '';
      document.getElementById('f-client').value      = project.client      || '';
      document.getElementById('f-category').value    = project.category    || '';
      document.getElementById('f-year').value        = project.year        || '';
      document.getElementById('f-link').value        = project.link        || '';
      document.getElementById('f-description').value = project.description || '';
      document.getElementById('f-tags').value        = (project.tags || []).join(', ');
      document.getElementById('f-cover').value       = project.coverImage  || '';
      document.getElementById('f-gradient').value    = project.gradient    || '';

      // Body blocks
      blocks = JSON.parse(JSON.stringify(project.body || []));
      renderBlocks();

      updateTagsPreview();
      updateGradientPreview();
      updatePresetActive();
      updateCoverPreview(project.coverImage || '');

      document.getElementById('preview-link').href = `project.html?id=${id}`;
      renderSidebar();
    }

    // ── Read form ─────────────────────────────────────────────────
    function readForm() {
      const id = document.getElementById('f-id').value.trim() || activeId;
      return {
        id,
        title:       document.getElementById('f-title').value.trim(),
        client:      document.getElementById('f-client').value.trim(),
        category:    document.getElementById('f-category').value.trim(),
        year:        document.getElementById('f-year').value.trim(),
        link:        document.getElementById('f-link').value.trim(),
        description: document.getElementById('f-description').value.trim(),
        tags:        document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
        coverImage:  document.getElementById('f-cover').value.trim(),
        gradient:    document.getElementById('f-gradient').value.trim(),
        body:        JSON.parse(JSON.stringify(blocks)),
        order:       projects.find(p => p.id === id)?.order ?? projects.length + 1,
      };
    }

    // ── Save ──────────────────────────────────────────────────────
    function saveProject() {
      if (!activeId) return;
      const updated = readForm();
      const idx = projects.findIndex(p => p.id === activeId);
      if (idx !== -1) {
        projects[idx] = updated;
        activeId = updated.id; // follow ID if it changed
      }
      ProjectStore.set(projects);
      setDirty(false);
      document.getElementById('slug-preview').textContent = activeId;
      document.getElementById('preview-link').href = `project.html?id=${activeId}`;
      renderSidebar();
      toast('Projeto salvo ✓');
    }

    // ── New project ───────────────────────────────────────────────
    function newProject() {
      const project = {
        id:          'projeto-' + Date.now(),
        title:       'Novo Projeto',
        client:      '',
        category:    '',
        year:        new Date().getFullYear().toString(),
        link:        '',
        description: '',
        tags:        [],
        coverImage:  '',
        gradient:    PRESETS[0].value,
        body:        [],
        order:       projects.length + 1,
      };
      projects.push(project);
      setDirty(true);
      renderSidebar();
      selectProject(project.id);
    }

    // ── Delete ────────────────────────────────────────────────────
    function deleteProject() {
      if (!activeId) return;
      const project = projects.find(p => p.id === activeId);
      if (!project) return;
      if (!confirm(`Excluir "${project.title}"? Esta ação não pode ser desfeita.`)) return;
      projects = projects.filter(p => p.id !== activeId);
      ProjectStore.sorted(projects).forEach((p, i) => { p.order = i + 1; });
      ProjectStore.set(projects);
      activeId = null;
      blocks   = [];
      setDirty(false);
      document.getElementById('form-wrap').classList.remove('visible');
      document.getElementById('placeholder').style.display = '';
      renderSidebar();
      toast('Projeto excluído');
    }

    // ── Export / Import ───────────────────────────────────────────
    function exportJSON() {
      const blob = new Blob([JSON.stringify(ProjectStore.sorted(projects), null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'projects.json';
      a.click();
      URL.revokeObjectURL(a.href);
      toast('JSON exportado ↓');
    }

    function importJSON(file) {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!Array.isArray(data)) throw new Error();
          projects = data;
          ProjectStore.set(projects);
          activeId = null;
          blocks   = [];
          document.getElementById('form-wrap').classList.remove('visible');
          document.getElementById('placeholder').style.display = '';
          renderSidebar();
          setDirty(false);
          toast(`${data.length} projetos importados ✓`);
        } catch { toast('Erro ao importar: JSON inválido'); }
      };
      reader.readAsText(file);
    }

    // ── Live field updates ────────────────────────────────────────
    function updateTagsPreview() {
      const chips = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
      document.getElementById('tags-preview').innerHTML = chips.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('');
    }

    function updateGradientPreview() {
      const val = document.getElementById('f-gradient').value;
      document.getElementById('gradient-preview-bar').style.background = val;
      const item = document.querySelector(`.proj-item[data-id="${activeId}"] .proj-item-swatch`);
      if (item) item.style.background = val;
    }

    function updatePresetActive() {
      const val = document.getElementById('f-gradient').value;
      document.querySelectorAll('.preset-swatch').forEach(sw => sw.classList.toggle('active', sw.dataset.gradient === val));
    }

    function updateCoverPreview(src) {
      const box = document.getElementById('cover-preview');
      const img = document.getElementById('cover-preview-img');
      if (src) {
        img.src     = src;
        img.onload  = () => box.classList.add('has-image');
        img.onerror = () => box.classList.remove('has-image');
      } else {
        box.classList.remove('has-image');
      }
    }

    // Wire basic field dirty tracking
    ['f-title','f-id','f-client','f-category','f-year','f-link','f-description'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        setDirty(true);
        if (id === 'f-id') document.getElementById('slug-preview').textContent = document.getElementById('f-id').value.trim();
      });
    });

    // Regen slug from title
    document.getElementById('btn-regen-id').addEventListener('click', () => {
      const title = document.getElementById('f-title').value.trim();
      if (!title) return;
      const slug = ProjectStore.generateId(title);
      document.getElementById('f-id').value = slug;
      document.getElementById('slug-preview').textContent = slug;
      setDirty(true);
    });
    document.getElementById('f-tags').addEventListener('input', () => { updateTagsPreview(); setDirty(true); });
    document.getElementById('f-gradient').addEventListener('input', () => { updateGradientPreview(); updatePresetActive(); setDirty(true); });
    document.getElementById('f-cover').addEventListener('input', e => { updateCoverPreview(e.target.value.trim()); setDirty(true); });

    // Wire add-block buttons
    document.querySelectorAll('[data-add]').forEach(btn => {
      btn.addEventListener('click', () => addBlock(btn.dataset.add));
    });

    // ── Build gradient presets ────────────────────────────────────
    function buildPresets() {
      const container = document.getElementById('gradient-presets');
      container.innerHTML = PRESETS.map(p => `
        <div class="preset-swatch" title="${p.label}" data-gradient="${p.value}" style="background:${p.value}"></div>`).join('');
      container.querySelectorAll('.preset-swatch').forEach(sw => {
        sw.addEventListener('click', () => {
          document.getElementById('f-gradient').value = sw.dataset.gradient;
          updateGradientPreview();
          updatePresetActive();
          setDirty(true);
        });
      });
    }

    // ── Wire top buttons ──────────────────────────────────────────
    document.getElementById('btn-new').addEventListener('click', newProject);
    document.getElementById('btn-save').addEventListener('click', saveProject);
    document.getElementById('btn-delete').addEventListener('click', deleteProject);
    document.getElementById('btn-export').addEventListener('click', exportJSON);
    document.getElementById('btn-import').addEventListener('click', () => document.getElementById('import-input').click());
    document.getElementById('import-input').addEventListener('change', e => {
      if (e.target.files[0]) importJSON(e.target.files[0]);
      e.target.value = '';
    });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); saveProject(); }
    });

    window.addEventListener('beforeunload', e => {
      if (dirty) { e.preventDefault(); e.returnValue = ''; }
    });

    // ── Init ──────────────────────────────────────────────────────
    async function init() {
      buildPresets();
      projects = await ProjectStore.get();
      renderSidebar();
    }
    init();
  </script>
</body>
</html>
